{% extends "base.html" %}
{% block title %}New Audit Cycle — Orbyn{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto">
  <h1 class="text-2xl font-bold mb-6">Create Audit Cycle</h1>

  <form method="POST" class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-4">
      <label class="block text-sm font-medium mb-1">Cycle Name *</label>
      <input type="text" name="name" required maxlength="255" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-500" placeholder="e.g. Q3 audit: Engineering dept">
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-sm font-medium mb-1">Scope: Department</label>
        <select name="scope_department_id" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-500">
          <option value="">-- None --</option>
          {% for d in departments %}
          <option value="{{ d.id }}">{{ d.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Scope: Location</label>
        <input type="text" name="scope_location" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-500" placeholder="e.g. Bengaluru HQ">
      </div>
    </div>
    <p class="text-xs text-gray-400 -mt-2 mb-4">Provide at least one scope filter (department or location).</p>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-sm font-medium mb-1">Start Date *</label>
        <input type="date" name="start_date" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-500">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">End Date *</label>
        <input type="date" name="end_date" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-500">
      </div>
    </div>

    <div class="mb-6">
      <label class="block text-sm font-medium mb-1">Assign Auditors *</label>
      <select name="auditor_ids" multiple required size="6" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-500">
        {% for a in auditors %}
        <option value="{{ a.id }}">{{ a.name }} ({{ a.role.replace('_',' ') }})</option>
        {% endfor %}
      </select>
      <p class="text-xs text-gray-400 mt-1">Hold Ctrl/Cmd to select multiple.</p>
    </div>

    <button type="submit" class="bg-brand-600 text-white px-5 py-2.5 rounded-md hover:bg-brand-700 font-medium">
      Create Audit Cycle
    </button>
  </form>
</div>
{% endblock %}
