{% extends "base.html" %}
{% block title %}Raise Maintenance Request - Orbyn{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto">
  <h1 class="text-2xl font-bold mb-6">Raise Maintenance Request</h1>

  <form method="POST" class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-4">
      <label class="block text-sm font-medium mb-1">Asset *</label>
      <select name="asset_id" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-500">
        <option value="">-- Select --</option>
        {% for asset in assets %}
        <option value="{{ asset.id }}" {% if preselect_asset_id == asset.id %}selected{% endif %}>{{ asset.tag }} - {{ asset.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium mb-1">Describe the Issue *</label>
      <textarea name="description" required maxlength="500" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-500" placeholder="e.g. AC unit making a loud noise, not cooling properly"></textarea>
    </div>

    <div class="mb-6">
      <label class="block text-sm font-medium mb-1">Priority</label>
      <select name="priority" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-500">
        {% for p in priorities %}
        <option value="{{ p }}" {% if p == 'medium' %}selected{% endif %}>{{ p|capitalize }}</option>
        {% endfor %}
      </select>
    </div>

    <button type="submit" class="bg-amber-600 text-white px-5 py-2.5 rounded-md hover:bg-amber-700 font-medium">
      Submit Request
    </button>
  </form>
</div>
{% endblock %}
