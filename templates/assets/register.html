{% extends "base.html" %}
{% block title %}Register Asset - Orbyn{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
  <h1 class="text-2xl font-bold mb-6">Register Asset</h1>

  <form method="POST" class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium mb-1">Asset Name *</label>
        <input type="text" name="name" required maxlength="255" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-500">
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Category *</label>
        <select name="category_id" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-500">
          <option value="">-- Select --</option>
          {% for cat in categories %}
          <option value="{{ cat.id }}">{{ cat.name }}</option>
          {% endfor %}
        </select>
        {% if not categories %}
        <p class="text-xs text-amber-600 mt-1">No categories yet - create one in <a href="{{ url_for('admin.categories') }}" class="underline">Org Setup</a> first.</p>
        {% endif %}
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Serial Number</label>
        <input type="text" name="serial_number" maxlength="100" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-500">
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Location *</label>
        <input type="text" name="location" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-500" placeholder="e.g. Bengaluru HQ, Floor 2">
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Acquisition Date</label>
        <input type="date" name="acquisition_date" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-500">
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Acquisition Cost</label>
        <input type="number" step="0.01" min="0" name="acquisition_cost" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-500" placeholder="For ranking/reports only">
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Condition</label>
        <select name="condition" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-500">
          <option value="good">Good</option>
          <option value="fair">Fair</option>
          <option value="poor">Poor</option>
        </select>
      </div>

      <div class="flex items-end pb-2">
        <label class="flex items-center gap-2">
          <input type="checkbox" name="is_shared" class="h-4 w-4">
          <span class="text-sm font-medium">Shared / Bookable resource</span>
        </label>
      </div>
    </div>

    <button type="submit" class="mt-6 bg-brand-600 text-white px-5 py-2.5 rounded-md hover:bg-brand-700 font-medium">
      Register Asset
    </button>
  </form>
</div>
{% endblock %}
